
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustOrbit - Where Talent Meets Opportunity</title>
    <link rel="stylesheet" href="landingpage.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Subtle Background Grid -->
    <div class="background-grid">
        <div class="line horizontal" style="top: 30%;"></div>
        <div class="line horizontal" style="top: 75%;"></div>
        <div class="line vertical" style="left: 45%;"></div>
        <div class="line vertical" style="left: 60%;"></div>
        <div class="line vertical" style="left: 85%;"></div>
    </div>
    
    <!-- Navigation -->
    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="#">HELP</a></li>
            <li><a href="#">SUPPORT</a></li>
            <li><a href="#">CONTACT US</a></li>
            <li><a href="#">ABOUT US</a></li>
        </ul>
    </nav>
    <!-- Main Content -->
    <main class="content">
        <!-- Quote Section -->
        <div class="quote-section">
            <div class="quote-mark open">“</div>
            <h1 class="headline">
                <div class="line-1">
                    <span class="thin-text">Where</span> <span class="bold-text">Talent</span>
                </div>
                <div class="line-2">
                    <span class="thin-text">Meets</span> <span class="bold-text">Opprtunitity</span>
                </div>
            </h1>
            <div class="quote-mark close">”</div>
        </div>

        <!-- Bottom Section -->
        <div class="bottom-section">
            <div class="logo">
                TRUSTORBIT
            </div>
            
            <div class="action-buttons">
                <!-- Login Button -->
                <a href="login page/login.html" class="btn btn-login">
                    <span class="btn-text">LOGIN</span>
                    <span class="arrow-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M4 12h16M13 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                </a>
                
                <!-- Get Started Button -->
                <a href="createaccount/createaccount.html" class="btn btn-get-started">
                    <span class="btn-text">G E T &nbsp;&nbsp; S T A R T E D</span>
                    <span class="play-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                            <path d="M8 5v14l11-7z" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                </a>
            </div>
        </div>
    </main>
    <script src="landingpage.js"></script>
</body>
</html>
