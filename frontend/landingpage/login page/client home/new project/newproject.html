<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details</title>
    <link rel="stylesheet" href="newproject.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <button class="back-btn" aria-label="Go back">&lt;</button>
        <div class="header">
            <h1>Project Details</h1>
        </div>
        <form id="projectForm" class="project-form">
            <div class="form-group">
                <input type="text" id="projectName" name="projectName" placeholder="Name Of Your Project " required>
            </div>
            <div class="form-group category-group">
                <input type="text" id="category" name="category" placeholder="Category " required>
            </div>
            <div class="form-group">
                <textarea id="projectDescription" name="projectDescription" placeholder="Description Of Your Project " required></textarea>
            </div>
            <div class="form-group small-group">
                <input type="text" id="budget" name="budget" placeholder="Budget " required>
            </div>
            <div class="form-group small-group">
                <input type="text" id="expectedDate" name="expectedDate" placeholder="Expected Date " required>
            </div>
            <div class="form-group small-group">
                <input type="text" id="talentUserName" name="talentUserName" placeholder="Talent User Name">
            </div>
            <div class="form-submit">
                <button type="submit" class="post-btn">
                    Post 
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 5L19 12L12 19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </form>
    </div>
    <script src="newproject.js"></script>
</body>
</html>
