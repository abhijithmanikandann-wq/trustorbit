<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Interface</title>
    <meta name="description" content="A beautiful and responsive menu interface with Agreement and Chat options">
    <link rel="stylesheet" href="clientagree.css">
</head>
<body>
    <button class="back-btn" aria-label="Go back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </button>
    <div class="container">
        <button class="menu-btn" id="agreement-btn" aria-label="Open Agreement">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <!-- Custom Receipt/Agreement Icon similar to reference -->
                <path d="M4 2v20l2-2 2 2 2-2 2 2 2-2 2 2 2-2 2 2V2a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2z"></path>
                <line x1="16" y1="14" x2="8" y2="14"></line>
                <line x1="16" y1="10" x2="8" y2="10"></line>
                <line x1="10" y1="6" x2="8" y2="6"></line>
                <!-- Fold effect -->
                <path d="M16 2v4h4"></path>
            </svg>
            <span>AGREEMENT</span>
        </button>
        <button class="menu-btn" id="chat-btn" aria-label="Open Chat">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <!-- Custom Chat Icon similar to reference -->
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                <line x1="9" y1="9" x2="15" y2="9"></line>
                <line x1="9" y1="13" x2="13" y2="13"></line>
            </svg>
            <span>C H A T</span>
        </button>
    </div>
    <script src="clientagree.js"></script>
</body>
</html>
