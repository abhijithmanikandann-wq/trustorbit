<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="clienthome.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="navbar">
        <div class="user-profile">
            <div class="avatar"></div>
            <div class="user-info">
                <span class="user-name">Name</span>
                <span class="user-id">User ID</span>
            </div>
        </div>
        <nav class="nav-links">
            <a href="#">HELP</a>
            <a href="#">SUPPORT</a>
            <a href="#">CONTACT US</a>
            <a href="#">ABOUT US</a>
        </nav>
    </header>
    <main class="dashboard-cards">
        <div class="card" id="messages-card">
            <div class="card-icon-wrapper">
                <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#dcdcdc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
            </div>
            <h2 class="card-title">Messages</h2>
        </div>
               <div class="card" id="contracts-card">
            <div class="card-icon-wrapper">
                <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#dcdcdc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <path d="M10.5 17.5L8 18l.5-2.5L15 9l2 2z"></path>
                </svg>
            </div>
            <h2 class="card-title">Active<br>Contracts</h2>
        </div>
        
        <div class="card" id="project-card">
            <div class="card-icon-wrapper">
                <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#dcdcdc" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </div>
            <h2 class="card-title">New<br>Project</h2>
        </div>
    </main>
    <script src="clienthome.js"></script>
</body>
</html>
