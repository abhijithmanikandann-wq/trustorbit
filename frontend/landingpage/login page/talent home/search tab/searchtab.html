<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Grid UI</title>
    <link rel="stylesheet" href="searchtab.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="top-bar">
            <button class="back-button" aria-label="Go back">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 18L9 12L15 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="search-container">
                <input type="text" class="search-bar" placeholder="SEARCH" aria-label="Search">
            </div>
        </header>
        <main class="grid-container" id="grid-container">
            <!-- Cards will be generated by JavaScript -->
        </main>
    </div>
    <script src="searchtab.js"></script>
</body>
</html>
