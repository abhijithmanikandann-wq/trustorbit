<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Video editing for a business promo">
    <title>Video Editing Promo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="req_accept.css">
</head>
<body>
    <div class="background">
        <!-- Generative SVG pattern placeholder in CSS -->
    </div>
    <!-- Back button/Icon top left -->
    <button class="back-btn" aria-label="Go back">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15 18L9 12L15 6" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>
    <main class="promo-container">
        <div class="promo-card">
            <header class="card-header">
                <div class="avatar"></div>
                <span class="user-name">Name</span>
            </header>
            <section class="card-content">
                <h1 class="main-title">..</h1>
                <h2 class="sub-title">..</h2>
                <div class="description">
                    <p>..</p>
                </div>
            </section>
        </div>
        <div class="action-buttons">
            <button class="btn btn-reject" id="rejectBtn">REJECT</button>
            <button class="btn btn-accept" id="acceptBtn">ACCEPT</button>
        </div>
    </main>
    <script src="req_accept.js"></script>
</body>
</html>
