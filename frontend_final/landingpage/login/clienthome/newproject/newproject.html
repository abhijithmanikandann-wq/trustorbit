<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Your Details</title>
    <link rel="stylesheet" href="newproject.css">
</head>
<body>
    <!-- Background pattern layer -->
    <div class="bg-waves"></div>
    <div class="container">
        <button class="logo" type="button" aria-label="Go back">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 18L9 12L15 6" stroke="black" stroke-width="4" stroke-linecap="square" stroke-linejoin="miter"/>
            </svg>
        </button>
        
        <h1 class="title">ENTER YOUR DETAILS</h1>
        
        <div class="form-wrapper">
            <form id="projectForm">
                <input type="text" name="projectName" placeholder="NAME YOUR PROJECT" class="input-medium" required>
                <input type="text" name="category" placeholder="CATEGORY" class="input-narrow" required>
                <textarea name="description" placeholder="DESCRIPTION" class="input-wide" required rows="3"></textarea>
                <input type="text" name="budget" placeholder="BUDGET" class="input-medium" required>
                <input type="text" name="expectedDate" placeholder="EXPECTED DATE" class="input-medium" onfocus="(this.type='date')" onblur="(this.value == '' ? this.type='text' : this.type='date')" required>
                <input type="text" name="talentUserName" placeholder="TALENT USER NAME" class="input-medium" required>
                
                <button type="submit" class="submit-btn">POST</button>
            </form>
        </div>
    </div>
    
    <script src="newproject.js"></script>
</body>
</html>
