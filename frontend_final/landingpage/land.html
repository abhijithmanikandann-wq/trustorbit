<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustOrbit</title>
    <!-- Importing a clean sans-serif font like Inter for modern feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="land.css">
</head>
<body>
    <!-- Background overlay to mimic pattern -->
    <div class="bg-pattern"></div>
    
    <div class="container">
        <header>
            <nav>
                <ul class="nav-links">
                    <li><a href="#">HELP</a></li>
                    <li><a href="#">SUPPORT</a></li>
                    <li><a href="#">CONTACT US</a></li>
                    <li><a href="#">ABOUT US</a></li>
                </ul>
            </nav>
        </header>
        
        <main>
            <div class="hero-section">
                <!-- Quote mark left -->
                <div class="quote quote-left">
                    <svg viewBox="0 0 24 24" width="64" height="64" fill="currentColor">
                        <path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"/>
                    </svg>
                </div>
                
                <h1 class="main-heading">
                    <div class="line1"><span class="thin">Where</span> <span class="bold yellow">Talent</span></div>
                    <div class="line2"><span class="thin">Meets</span> <span class="bold yellow">Opportunity</span></div>
                </h1>
                
                <!-- Quote mark right -->
                <div class="quote quote-right">
                    <svg viewBox="0 0 24 24" width="64" height="64" fill="currentColor">
                        <path d="M9.983 3v7.391c0 5.704-3.731 9.57-8.983 10.609l-.995-2.151c2.432-.917 3.995-3.638 3.995-5.849h-4v-10h9.983zm14.017 0v7.391c0 5.704-3.748 9.57-9 10.609l-.996-2.151c2.433-.917 3.996-3.638 3.996-5.849h-3.983v-10h9.983z"/>
                    </svg>
                </div>
            </div>
            
            <div class="footer-section">
                <div class="brand">
                    <h2>TRUSTORBIT</h2>
                </div>
                <div class="cta-buttons">
                    <button class="btn btn-yellow" id="loginBtn">L O G I N</button>
                    <button class="btn btn-yellow" id="startBtn">G E T &nbsp;S T A R T E D</button>
                </div>
            </div>
        </main>
    </div>
    <script src="land.js"></script>
</body>
</html>
