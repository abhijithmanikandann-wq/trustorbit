services:
  postgres:
    image: postgres:16-alpine
    container_name: trustorbit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trustorbit}
      POSTGRES_USER: ${POSTGRES_USER:-trustorbit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trustorbit_dev_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
